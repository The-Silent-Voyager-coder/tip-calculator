<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tip Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:460px;padding:20px}h1{text-align:center;color:#38bdf8;margin-bottom:16px;font-size:1.3rem}
.field{background:#1e293b;padding:12px 14px;border-radius:8px;margin-bottom:10px}
.field label{font-size:13px;color:#94a3b8;display:flex;justify-content:space-between;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:16px;font-family:monospace}
.field input:focus{outline:none;border-color:#38bdf8}
.field input[type=range]{padding:0;accent-color:#38bdf8}
.presets{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.presets button{padding:8px 14px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:500}
.presets button.active,.presets button:hover{background:#38bdf8;color:#0f172a;border-color:#38bdf8}
#results{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.rbox{background:#1e293b;padding:14px;border-radius:8px;text-align:center;border:1px solid #334155}
.rbox .lb{font-size:11px;color:#64748b;text-transform:uppercase}
.rbox .rv{font-size:22px;font-weight:700;color:#38bdf8;font-family:monospace}
.rbox.total .rv{color:#22c55e}
small{color:#64748b;font-size:11px;display:block;margin-top:10px;text-align:center}
</style></head>
<body>
<div class="container">
<h1>&#128176; Tip Calculator</h1>
<div class="field"><label>Bill Amount <span>$<span id="billVal">50.00</span></span></label><input type="number" id="bill" value="50" min="0" step="0.01" oninput="calc()"></div>
<div class="field"><label>Tip: <span id="tipPctVal">15</span>%</label><input type="range" id="tipPct" min="0" max="100" value="15" oninput="calc()"></div>
<div class="presets">
<button onclick="setTip(10)">10%</button><button onclick="setTip(15)" class="active">15%</button>
<button onclick="setTip(18)">18%</button><button onclick="setTip(20)">20%</button><button onclick="setTip(25)">25%</button>
</div>
<div class="field"><label>Split <span id="splitVal">1</span> way</label><input type="range" id="split" min="1" max="20" value="1" oninput="calc()"></div>
<div id="results">
<div class="rbox"><div class="lb">Tip per person</div><div class="rv" id="tipPer">$7.50</div></div>
<div class="rbox total"><div class="lb">Total per person</div><div class="rv" id="totalPer">$57.50</div></div>
</div>
<small>Bill $<span id="billTotal">50.00</span> + Tip $<span id="tipTotal">7.50</span> = $<span id="grandTotal">57.50</span></small>
</div>
<script>
function setTip(v){
document.getElementById('tipPct').value=v;document.querySelectorAll('.presets button').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.presets button').forEach(b=>{if(parseInt(b.textContent)===v)b.classList.add('active')});
calc()
}
function calc(){
const bill=parseFloat(document.getElementById('bill').value)||0;
const pct=parseFloat(document.getElementById('tipPct').value)||0;
const split=parseInt(document.getElementById('split').value)||1;
document.getElementById('billVal').textContent=bill.toFixed(2);
document.getElementById('tipPctVal').textContent=pct;
document.getElementById('splitVal').textContent=split;
const tip=bill*pct/100;
const total=bill+tip;
document.getElementById('tipPer').textContent='$'+(tip/split).toFixed(2);
document.getElementById('totalPer').textContent='$'+(total/split).toFixed(2);
document.getElementById('billTotal').textContent=bill.toFixed(2);
document.getElementById('tipTotal').textContent=tip.toFixed(2);
document.getElementById('grandTotal').textContent=total.toFixed(2);
}
window.onload=calc;
</script></body>
</html>
